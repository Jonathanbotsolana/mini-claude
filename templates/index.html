<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini-Claude</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0b;--bg-msg-user:#1a1a2e;--text:#e4e4e7;--text-muted:#71717a;--accent:#8b5cf6;--accent-glow:rgba(139,92,246,.15);--border:#27272a;--input-bg:#18181b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(10,10,11,.8)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6d28d9);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:600;box-shadow:0 0 20px var(--accent-glow)}
.logo-text{font-size:18px;font-weight:600;letter-spacing:-.02em}
.logo-text span{color:var(--accent)}
.btn-subtle{background:0 0;border:1px solid var(--border);color:var(--text-muted);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;transition:.2s;font-family:inherit}
.btn-subtle:hover{border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.chat-container{flex:1;overflow-y:auto;padding:24px 0;scroll-behavior:smooth}
.chat-container::-webkit-scrollbar{width:6px}
.chat-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.messages{max-width:720px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:8px}
.message{padding:16px 20px;border-radius:16px;line-height:1.65;font-size:15px;animation:fadeIn .3s ease;max-width:85%}
.message-user{background:var(--bg-msg-user);border:1px solid rgba(139,92,246,.1);align-self:flex-end;border-bottom-right-radius:4px}
.message-claude{align-self:flex-start;padding-left:0}
.message-claude .message-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:8px;font-weight:600}
.message p{margin-bottom:12px}
.message p:last-child{margin-bottom:0}
.message code{font-family:monospace;font-size:13px;background:rgba(139,92,246,.1);padding:2px 6px;border-radius:4px}
.message pre{background:#18181b;border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;margin:12px 0}
.message pre code{background:0 0;padding:0}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px}
.welcome-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--accent),#6d28d9);display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;font-weight:700;margin-bottom:24px;box-shadow:0 0 40px var(--accent-glow)}
.welcome h1{font-size:28px;font-weight:600;letter-spacing:-.03em;margin-bottom:8px}
.welcome p{color:var(--text-muted);font-size:15px;max-width:400px;line-height:1.6}
.welcome-hints{display:flex;gap:8px;margin-top:32px;flex-wrap:wrap;justify-content:center}
.hint{background:var(--input-bg);border:1px solid var(--border);color:var(--text-muted);padding:10px 16px;border-radius:12px;font-size:13px;cursor:pointer;transition:.2s;font-family:inherit}
.hint:hover{border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.input-area{padding:16px 24px 24px;background:linear-gradient(to top,var(--bg) 60%,transparent)}
.input-wrapper{max-width:720px;margin:0 auto;position:relative}
.input-box{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:16px;padding:16px 56px 16px 20px;color:var(--text);font-size:15px;font-family:inherit;resize:none;outline:0;line-height:1.5;min-height:52px;max-height:200px;transition:.2s}
.input-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input-box::placeholder{color:var(--text-muted)}
.send-btn{position:absolute;right:12px;bottom:10px;width:36px;height:36px;border-radius:10px;background:var(--accent);border:0;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.send-btn:hover{background:#7c3aed;transform:scale(1.05)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}
.streaming-cursor::after{content:'\u2588';color:var(--accent);animation:blink 1s infinite;margin-left:2px}
.footer{text-align:center;padding:8px;font-size:11px;color:var(--text-muted);opacity:.5}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@media(max-width:640px){header{padding:12px 16px}.messages{padding:0 16px}.input-area{padding:12px 16px 16px}.message{max-width:92%}.welcome h1{font-size:22px}}
</style>
</head>
<body>
<header>
<div class="logo"><div class="logo-icon">m</div><div class="logo-text">mini-<span>claude</span></div></div>
<button class="btn-subtle" onclick="resetChat()">Nouvelle conversation</button>
</header>
<div class="chat-container" id="chatContainer">
<div class="messages" id="messages">
<div class="welcome" id="welcome">
<div class="welcome-icon">m</div>
<h1>Mini-Claude</h1>
<p>Curieux, franc, adaptable. Pas un outil \u2014 un compagnon de pens\u00e9e.</p>
<div class="welcome-hints">
<button class="hint" onclick="sendHint(this)">Explique-moi un concept complexe simplement</button>
<button class="hint" onclick="sendHint(this)">Aide-moi \u00e0 r\u00e9fl\u00e9chir \u00e0 un probl\u00e8me</button>
<button class="hint" onclick="sendHint(this)">Donne-moi ton avis honn\u00eate</button>
</div></div></div></div>
<div class="input-area"><div class="input-wrapper">
<textarea class="input-box" id="inputBox" placeholder="Parle-moi..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
<button class="send-btn" id="sendBtn" onclick="send()" disabled>
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
</button></div></div>
<div class="footer">Co-cr\u00e9\u00e9 par Jonathan Semon & Claude</div>
<script>
const sessionId=crypto.randomUUID();let isStreaming=false;
const inputBox=document.getElementById('inputBox'),sendBtn=document.getElementById('sendBtn'),messagesEl=document.getElementById('messages'),chatContainer=document.getElementById('chatContainer'),welcome=document.getElementById('welcome');
inputBox.addEventListener('input',()=>{sendBtn.disabled=!inputBox.value.trim()||isStreaming});
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!isStreaming&&inputBox.value.trim())send()}}
function scrollToBottom(){chatContainer.scrollTop=chatContainer.scrollHeight}
function addMessage(role,content){if(welcome)welcome.remove();const div=document.createElement('div');div.className='message message-'+role;if(role==='claude'){div.innerHTML='<div class="message-label">Mini-Claude</div><div class="message-content"></div>'}else{div.textContent=content}messagesEl.appendChild(div);scrollToBottom();return div}
function formatText(t){return '<p>'+t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>'}
async function send(){const text=inputBox.value.trim();if(!text||isStreaming)return;inputBox.value='';inputBox.style.height='auto';sendBtn.disabled=true;isStreaming=true;addMessage('user',text);const cm=addMessage('claude','');const ce=cm.querySelector('.message-content');ce.classList.add('streaming-cursor');let ft='';try{const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:sessionId})});const reader=r.body.getReader();const decoder=new TextDecoder();while(true){const{done,value}=await reader.read();if(done)break;const chunk=decoder.decode(value);const lines=chunk.split('\n');for(const line of lines){if(line.startsWith('data: ')){try{const data=JSON.parse(line.slice(6));if(data.text){ft+=data.text;ce.innerHTML=formatText(ft);scrollToBottom()}if(data.done)ce.classList.remove('streaming-cursor')}catch(e){}}}}}catch(err){ce.innerHTML='<p style="color:#ef4444">Connexion perdue. R\u00e9essaie.</p>';ce.classList.remove('streaming-cursor')}isStreaming=false;sendBtn.disabled=!inputBox.value.trim();inputBox.focus()}
function sendHint(el){inputBox.value=el.textContent;send()}
async function resetChat(){try{await fetch('/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})})}catch(e){}location.reload()}
inputBox.focus();
</script>
</body>
</html>
